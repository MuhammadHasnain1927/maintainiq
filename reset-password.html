<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose a new password · MaintainIQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27><rect width=%2764%27 height=%2764%27 rx=%2714%27 fill=%27%23F5A623%27/><text x=%2732%27 y=%2744%27 font-family=%27Arial Black,Arial%27 font-size=%2736%27 font-weight=%27900%27 text-anchor=%27middle%27 fill=%27%231A1300%27>M</text></svg>"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-single">
      <div class="auth-card">
        <div class="auth-brand-row">
          <div class="brand-name">
            Maintain<span style="color: var(--accent)">IQ</span>
          </div>
        </div>
        <h1>Choose a new password</h1>
        <p class="sub" id="subText">Set a new password for your account.</p>
        <form id="resetForm">
          <div class="field">
            <label for="pass1">New password</label
            ><input
              id="pass1"
              type="password"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="Minimum 6 characters"
            />
          </div>
          <div class="field">
            <label for="pass2">Confirm new password</label
            ><input
              id="pass2"
              type="password"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="Repeat it exactly"
            />
          </div>
          <button
            class="btn btn-primary"
            style="width: 100%"
            id="resetBtn"
            type="submit"
          >
            Update password
          </button>
        </form>
        <p class="auth-switch">
          <a class="link" href="index.html">← Back to sign in</a>
        </p>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
      (async () => {
        await new Promise((r) => setTimeout(r, 400));
        const session = await getSession();
        if (!session) {
          document.getElementById("resetForm").style.display = "none";
          document.getElementById("subText").innerHTML =
            `This reset link is invalid or has expired. <a class="link" href="forgot-password.html">Request a new one</a>.`;
        }
      })();
      document
        .getElementById("resetForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const p1 = document.getElementById("pass1").value;
          const p2 = document.getElementById("pass2").value;
          if (p1 !== p2) {
            toast("Passwords don't match.", true);
            return;
          }
          const btn = document.getElementById("resetBtn");
          btn.disabled = true;
          btn.textContent = "Updating…";
          const { error } = await db.auth.updateUser({ password: p1 });
          if (error) {
            toast(error.message, true);
            btn.disabled = false;
            btn.textContent = "Update password";
            return;
          }
          toast("Password updated. Taking you to your dashboard…");
          setTimeout(() => (location.href = "dashboard.html"), 1200);
        });
    </script>
  </body>
</html>
